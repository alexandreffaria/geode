services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geode-backend
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geode-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
